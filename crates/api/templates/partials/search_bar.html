<!-- crates/api/templates/partials/search_bar.html -->
<form action="/search" method="GET" class="w-full relative group">
    <div class="relative flex items-center w-full">
        <!-- Icono lupa -->
        <span class="absolute left-4 text-slate-400 group-focus-within:text-brand-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </span>
        
        <!-- Campo de búsqueda -->
        <input 
            type="search" 
            name="q" 
            id="input-search-query" 
            placeholder="¿Qué estás buscando hoy en Nebripop?" 
            value="{{ query_param|default("") }}"
            class="w-full pl-12 pr-24 py-3 bg-slate-50 hover:bg-slate-100/75 focus:bg-white text-slate-800 placeholder-slate-400 rounded-2xl border border-transparent focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 transition-all outline-none font-sans text-sm"
            required
        >

        <!-- Botón buscar -->
        <button 
            type="submit" 
            id="btn-search-submit" 
            class="absolute right-2 px-4 py-1.5 bg-brand-500 hover:bg-brand-600 active:scale-[0.98] text-white font-semibold rounded-xl text-xs transition-all shadow-md shadow-brand-500/5 hover:shadow-brand-500/15"
        >
            Buscar
        </button>
    </div>
</form>
