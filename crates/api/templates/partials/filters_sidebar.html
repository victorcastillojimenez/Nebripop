<!-- crates/api/templates/partials/filters_sidebar.html -->
<aside class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 space-y-8 sticky top-24">
    <div class="flex items-center justify-between border-b border-slate-100 pb-4">
        <h3 class="font-display font-bold text-lg text-slate-800 flex items-center gap-2">
            <span>⚙️</span> Filtros de búsqueda
        </h3>
        <a href="/search" class="text-xs font-semibold text-slate-400 hover:text-brand-500 transition-colors">Limpiar todo</a>
    </div>

    <form action="/search" method="GET" id="form-search-filters" class="space-y-6">
        <!-- Mantener la búsqueda si existía -->
        {% if query_param.is_some() %}
        <input type="hidden" name="q" value="{{ query_param.as_ref().unwrap() }}">
        {% endif %}

        <!-- Categorías -->
        <div class="space-y-3">
            <h4 class="font-display font-semibold text-sm text-slate-700 uppercase tracking-wider">Categoría</h4>
            <div class="space-y-2">
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="radio" name="category" value="libros" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20" 
                        {% if selected_category.as_deref() == Some("libros") %}checked{% endif %}>
                    <span class="group-hover:translate-x-0.5 transition-transform">📚 Libros y Apuntes</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="radio" name="category" value="tecnologia" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20"
                        {% if selected_category.as_deref() == Some("tecnologia") %}checked{% endif %}>
                    <span class="group-hover:translate-x-0.5 transition-transform">💻 Tecnología</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="radio" name="category" value="hogar" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20"
                        {% if selected_category.as_deref() == Some("hogar") %}checked{% endif %}>
                    <span class="group-hover:translate-x-0.5 transition-transform">🏠 Hogar y Residencia</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="radio" name="category" value="moda" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20"
                        {% if selected_category.as_deref() == Some("moda") %}checked{% endif %}>
                    <span class="group-hover:translate-x-0.5 transition-transform">👕 Ropa y Accesorios</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="radio" name="category" value="otros" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20"
                        {% if selected_category.as_deref() == Some("otros") %}checked{% endif %}>
                    <span class="group-hover:translate-x-0.5 transition-transform">✨ Otros</span>
                </label>
            </div>
        </div>

        <!-- Rango de Precios -->
        <div class="space-y-3">
            <h4 class="font-display font-semibold text-sm text-slate-700 uppercase tracking-wider">Rango de precio (€)</h4>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label for="price-min" class="sr-only">Mínimo</label>
                    <input 
                        type="number" 
                        id="price-min" 
                        name="min_price" 
                        placeholder="Mín" 
                        value="{% if min_price.is_some() %}{{ min_price.as_ref().unwrap() }}{% endif %}"
                        class="w-full px-3 py-2 bg-slate-50 border border-slate-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 rounded-xl outline-none text-sm transition-all text-slate-700"
                    >
                </div>
                <div>
                    <label for="price-max" class="sr-only">Máximo</label>
                    <input 
                        type="number" 
                        id="price-max" 
                        name="max_price" 
                        placeholder="Máx" 
                        value="{% if max_price.is_some() %}{{ max_price.as_ref().unwrap() }}{% endif %}"
                        class="w-full px-3 py-2 bg-slate-50 border border-slate-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 rounded-xl outline-none text-sm transition-all text-slate-700"
                    >
                </div>
            </div>
        </div>

        <!-- Estado del Producto -->
        <div class="space-y-3">
            <h4 class="font-display font-semibold text-sm text-slate-700 uppercase tracking-wider">Estado del producto</h4>
            <div class="space-y-2">
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="checkbox" name="condition" value="nuevo" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20 rounded"
                        {% if filters::contains(selected_conditions, "nuevo") %}checked{% endif %}>
                    <span>Nuevo</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="checkbox" name="condition" value="como_nuevo" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20 rounded"
                        {% if filters::contains(selected_conditions, "como_nuevo") %}checked{% endif %}>
                    <span>Como nuevo</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="checkbox" name="condition" value="bueno" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20 rounded"
                        {% if filters::contains(selected_conditions, "bueno") %}checked{% endif %}>
                    <span>Buen estado</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-slate-600 hover:text-brand-500 cursor-pointer group">
                    <input type="checkbox" name="condition" value="usado" class="w-4 h-4 text-brand-500 border-slate-300 focus:ring-brand-500/20 rounded"
                        {% if filters::contains(selected_conditions, "usado") %}checked{% endif %}>
                    <span>Aceptable</span>
                </label>
            </div>
        </div>

        <!-- Botón Aplicar -->
        <button 
            type="submit" 
            id="btn-apply-filters" 
            class="w-full py-3 bg-brand-500 hover:bg-brand-600 active:scale-[0.98] text-white font-semibold rounded-2xl transition-all shadow-md shadow-brand-500/10 hover:shadow-brand-500/20 text-sm"
        >
            Aplicar filtros
        </button>
    </form>
</aside>
